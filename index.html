<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Apps</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body{
  margin:0;
  padding:24px 16px 40px;
  font-family:'Noto Sans Arabic', Cairo, Arial, sans-serif;
  background:#111;
  color:#fff;
  text-align:center;
}

h1{
  margin: 0 0 24px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0.5px;
  color:#fff;
}

.apps{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:16px;
  max-width: 520px;
  margin: 0 auto;
}

.card{
  background:#1c1c1c;
  border:1px solid #2a2a2a;
  border-radius:16px;
  padding:12px;
  text-align:center;
  text-decoration:none;
  color:#fff;
  display:flex;
  flex-direction:column;
  transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  overflow:hidden;
}

.card:active{
  transform: scale(0.97);
}

.card:hover{
  border-color:#e60000;
  box-shadow: 0 8px 20px rgba(230,0,0,0.15);
}

.card .thumb{
  width:100%;
  aspect-ratio: 1 / 1;
  border-radius:12px;
  overflow:hidden;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card .thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.card h3{
  margin:12px 0 4px;
  font-size:15px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.card p{
  margin:0;
  color:#999;
  font-size:13px;
}
</style>
</head>

<body>

<h1>KurdMan Apps</h1>

<div class="apps">

  <a class="card" href="pro-gym.html">
    <div class="thumb"><img src="banner.jpg" alt="Pro Gym Workout"></div>
    <h3>Pro Gym Workout</h3>
    <p>v6.5</p>
  </a>

  <a class="card" href="kurdmantv.html">
    <div class="thumb"><img src="IMG_20260704_220237_180.png" alt="KurdMan TV"></div>
    <h3>KurdMan TV</h3>
    <p>Latest Version</p>
  </a>

  <a class="card" href="grok.html">
    <div class="thumb"><img src="file_000000000c6871f4bc40d78c2cdf5660.png" alt="Grok AI"></div>
    <h3>Grok AI</h3>
    <p>v1.1.89</p>
  </a>

  <a class="card" href="chatgpt.html">
    <div class="thumb"><img src="chatgpt.png" alt="ChatGPT"></div>
    <h3>ChatGPT</h3>
    <p>v1.3.1</p>
  </a>

</div>

</body>
</html>
